- name: Install Docker dependencies
  dnf:
    name: dnf-plugins-core
    state: present

- name: Add Docker repo
  command: sudo dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo

- name: Install Docker
  dnf:
    name:
      - docker
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present



- name: Add user to docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_users }}"

