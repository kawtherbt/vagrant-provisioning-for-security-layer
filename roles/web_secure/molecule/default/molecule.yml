dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: instance
    image: rockylinux:9
    privileged: true
    # volumes:
    #   - /sys/fs/cgroup:/sys/fs/cgroup:rw
    # command: /usr/sbin/init

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible-${USER}/tmp
      interpreter_python: auto_silent
      roles_path: ../../..
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible