- name: Install firewalld
  dnf:
    name: firewalld
    state: present

- name: Start firewalld
  service:
    name: firewalld
    state: started
    enabled: yes

- name: Allow ports
  firewalld:
    port: "{{ item }}"
    permanent: yes
    state: enabled
  loop:
    - 80/tcp
    - 443/tcp
    - 2222/tcp

- name: Remove SSH default port
  firewalld:
    service: ssh
    state: disabled
    permanent: yes

- name: Reload firewall
  command: firewall-cmd --reload