- name: Install Docker dependencies
  dnf:
    name: dnf-plugins-core
    state: present

- name: Add Docker repo
  command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo

- name: Install Docker
  dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: yes